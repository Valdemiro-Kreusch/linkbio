<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Valdemiro Kreusch</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1F3A;--navy2:#112847;--navy3:#1a3558;
  --gold:#C9A84C;--gold-lt:#E8C97A;
  --white:#FFFFFF;--muted:rgba(255,255,255,.45);
}
body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  background:linear-gradient(145deg,#071628 0%,#0B1F3A 55%,#0d2545 100%);
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 40px;
}
.top-bar{width:100%;height:4px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-lt),var(--gold),transparent);}

.wrap{
  width:100%;max-width:440px;
  padding:48px 24px 16px;
  display:flex;flex-direction:column;align-items:center;
  animation:up .8s cubic-bezier(.22,1,.36,1) both;
}
@keyframes up{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}

/* ── AVATAR ── */
.avatar-ring{position:relative;width:116px;height:116px;margin-bottom:28px;cursor:pointer;}
.avatar-ring::before{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  background:conic-gradient(var(--gold),var(--gold-lt),var(--gold),#071628,var(--gold));
  animation:spin 8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.avatar-ring::after{content:'';position:absolute;inset:0;border-radius:50%;background:var(--navy);}
.avatar{position:relative;z-index:1;width:110px;height:110px;border-radius:50%;object-fit:cover;object-position:center top;display:block;margin:3px auto 0;background:var(--navy3);}
#overlay{position:absolute;inset:0;z-index:2;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(0,0,0,.45);opacity:0;transition:opacity .3s;pointer-events:none;}
.avatar-ring:hover #overlay{opacity:1;}

/* ── PERFIL ── */
.name{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;color:var(--white);letter-spacing:.5px;text-align:center;line-height:1.15;}
.role{margin-top:6px;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold);text-align:center;}
.bio{margin-top:14px;font-size:14px;font-weight:400;color:rgba(255,255,255,.65);text-align:center;line-height:1.7;max-width:320px;font-style:italic;}
.rule{width:48px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:28px auto;border-radius:2px;}

/* ── BOTÕES ── */
.links{width:100%;display:flex;flex-direction:column;gap:12px;}
.btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:15px 22px;border-radius:6px;
  text-decoration:none;font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;letter-spacing:.3px;
  cursor:pointer;border:1px solid rgba(201,168,76,.25);
  background:var(--navy2);color:var(--white);
  box-shadow:0 2px 12px rgba(0,0,0,.25);
  transition:all .3s cubic-bezier(.22,1,.36,1);
}
.btn:hover{
  background:linear-gradient(120deg,var(--gold),var(--gold-lt));
  color:var(--navy);border-color:transparent;
  transform:translateY(-3px);box-shadow:0 8px 28px rgba(201,168,76,.35);
}
.btn .lbl{flex:1;text-align:left;}
.btn .arr{font-size:16px;opacity:.4;transition:transform .3s,opacity .3s;}
.btn:hover .arr{transform:translateX(5px);opacity:1;}

/* ── FOOTER ── */
footer{margin-top:36px;text-align:center;font-size:11px;color:rgba(255,255,255,.28);line-height:1.9;padding-bottom:24px;}
footer a{color:var(--gold);text-decoration:none;opacity:.75;}
footer a:hover{opacity:1;}

@media(max-width:380px){
  .name{font-size:28px;}
  .wrap{padding:36px 16px 16px;}
}
</style>
</head>
<body>

<div class="top-bar"></div>

<div class="wrap">

  <div class="avatar-ring" onclick="document.getElementById('photoInput').click()" title="Clique para trocar a foto">
    <img id="avatar" class="avatar"
      src="foto.jpg"
      alt="Valdemiro Kreusch"
      onerror="this.src='https://ui-avatars.com/api/?name=VK&background=112847&color=C9A84C&size=220&bold=true&font-size=0.5'"/>
    <div id="overlay">📷</div>
  </div>
  <input type="file" id="photoInput" accept="image/*" style="display:none"/>

  <h1 class="name">Valdemiro Kreusch</h1>
  <p class="role">Gestor Jurídico &nbsp;·&nbsp; Autor &nbsp;·&nbsp; Mentor</p>
  <p class="bio">"Ajudo advogados a construir um legado de propósito e prosperidade"</p>

  <div class="rule"></div>

  <nav class="links">

    <a class="btn" href="livros.html">
      <span class="lbl">Meus Livros</span>
      <span class="arr">→</span>
    </a>

    <a class="btn" href="mentoria-agn.html">
      <span class="lbl">Mentoria · Advogado Gerador de Negócios</span>
      <span class="arr">→</span>
    </a>

    <a class="btn" href="mentoria-clevel.html">
      <span class="lbl">Mentoria · Advogado C-Level</span>
      <span class="arr">→</span>
    </a>

    <a class="btn" href="palestras.html">
      <span class="lbl">Palestras e Treinamentos</span>
      <span class="arr">→</span>
    </a>

    <a class="btn" href="https://www.grupoeos.com.br" target="_blank" rel="noopener">
      <span class="lbl">Grupo ÉOS</span>
      <span class="arr">→</span>
    </a>

  </nav>

  <footer>
    <p>© 2026 · Valdemiro Kreusch</p>
  </footer>

</div>

<script>
document.getElementById('photoInput').addEventListener('change',function(){
  const file=this.files[0];
  if(!file)return;
  document.getElementById('avatar').src=URL.createObjectURL(file);
});
(async()=>{
  const fns=['valdemiro.jpg','foto.jpg','profile.jpg','photo.jpg',
    'Retratos-EOS-Advogados-11-foto-AleCarnieri.jpg',
    '21052022211A3126.jpg','211A9328__1_.jpg'];
  for(const fn of fns){
    try{
      const buf=await window.fs.readFile(fn);
      document.getElementById('avatar').src=URL.createObjectURL(new Blob([buf],{type:'image/jpeg'}));
      break;
    }catch(e){}
  }
})();
</script>
</body>
</html>
